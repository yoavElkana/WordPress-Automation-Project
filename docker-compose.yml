version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    # פתיחת הפורט מאפשרת ל-DBeaver "לדבר" עם מסד הנתונים מחוץ לדוקר
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wordpress
    # השורה הבאה פותרת את שגיאת ה-Public Key Retrieval שקיבלת ב-DBeaver
    command: --default-authentication-plugin=mysql_native_password

  wordpress:
    image: wordpress:latest
    depends_on:
      - db
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DB_NAME: wordpress